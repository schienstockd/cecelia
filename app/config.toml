# Cecelia Pineapple — default configuration
# Do NOT edit this file directly. Override values in ~/cecelia-pineapple/dev/custom.toml

[dirs]
projects       = "/path/to/projects"
bioformats2raw = "/path/to/bioformats2raw"
python         = "python3"

  [dirs.tasks]
  populations     = "populations"
  data            = "data"
  log             = "log"
  labels          = "labels"
  labelProps      = "labelProps"
  tasks           = "tasks"
  stats           = "stats"
  mesh            = "mesh"
  shapes          = "shapes"
  classifications = "cl"
  models          = "models"
  out             = "out"

[files]
labelProps = "labelProps.h5ad"
labels     = "labels.zarr"
anndata    = "adata.h5ad"

[images]
lenUID = 6

  [images.normalise]
  percentile = 99.98

# Napari viewer bridge.
[napari]
# Render napari on the discrete GPU when the machine has hybrid graphics. On Linux this launches the
# bridge with DRI_PRIME (AMD/Intel) and, when an NVIDIA GPU is present, NVIDIA PRIME render-offload
# env vars so the viewer uses the dGPU instead of the integrated one. Ignored on Windows/macOS (GPU
# choice is an OS/driver setting there). Can be flipped at runtime from Settings; this value is the
# default the server starts with. The env var CECELIA_NAPARI_DISCRETE_GPU overrides it.
discreteGpu = false

[tasks]
concurrentLimit = 20

# Named resource pools for the task scheduler.
# Each module function's JSON spec declares which pool it uses via "resource_pool".
# Override in custom.toml to match your hardware (e.g. gpu=2 on a multi-GPU node).
[pools]
default = 20   # general-purpose; matches tasks.concurrentLimit
gpu       = 1    # GPU-bound tasks (cellpose): serialised by default
gpu-light = 4    # segmentation and other GPU tasks tolerant of light concurrency
io        = 8    # IO-bound tasks (bioformats2raw conversion)
