# Cecelia Pineapple — default configuration
# Do NOT edit this file directly. Override values in your user custom.toml (~/.cecelia/custom.toml;
# in a dev checkout, custom.toml under CECELIA_DEV_DIR). The setup wizard writes dirs.projects there.

[dirs]
projects       = "/path/to/projects"
bioformats2raw = "/path/to/bioformats2raw"
python         = "python3"

  [dirs.tasks]
  populations     = "populations"
  data            = "data"
  log             = "log"
  labels          = "labels"
  labelProps      = "labelProps"
  tasks           = "tasks"
  stats           = "stats"
  mesh            = "mesh"
  shapes          = "shapes"
  classifications = "cl"
  models          = "models"
  out             = "out"

[files]
labelProps = "labelProps.h5ad"
labels     = "labels.zarr"
anndata    = "adata.h5ad"

[images]
lenUID = 6

  [images.normalise]
  percentile = 99.98

# Napari viewer bridge.
[napari]
# Render napari on the discrete GPU when the machine has hybrid graphics. On Linux this launches the
# bridge with DRI_PRIME (AMD/Intel) and, when an NVIDIA GPU is present, NVIDIA PRIME render-offload
# env vars so the viewer uses the dGPU instead of the integrated one. Ignored on Windows/macOS (GPU
# choice is an OS/driver setting there). Can be flipped at runtime from Settings; this value is the
# default the server starts with. The env var CECELIA_NAPARI_DISCRETE_GPU overrides it.
discreteGpu = false

[tasks]
concurrentLimit = 20

# Named resource pools for the task scheduler — one per real bottleneck resource.
# Each module function's JSON spec declares which pool it uses via "resource_pool".
# These are just starting defaults: each pool's limit is adjustable live (Settings), so
# throttle whenever you want (e.g. drop `io` to 1 when importing over a slow SMB share).
# Override the defaults in custom.toml to match your hardware (e.g. gpu=2 on a multi-GPU node).
[pools]
cpu     = 20   # general CPU compute — most tasks (was "default")
gpu     = 1    # the GPU — cellpose family; raise for batch segmentation
io      = 8    # local disk IO — bioformats2raw import/convert, crop
network = 1    # remote/SMB reads — reserved for HPC/remote tasks (no tasks assigned yet)
