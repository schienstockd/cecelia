name: Release

# On a version tag (v*), build the frontend, package a portable bundle (prebuilt frontend
# included, so running needs no Node), and publish a GitHub Release with the bundle + the install
# scripts as assets. The install scripts then bootstrap Pixi + Juliaup on the user's machine and
# provision the env there.
#
# One job is enough: the bundle is OS-independent (Julia + the Python env are provisioned per-OS
# at install time by juliaup/pixi). Only the install *script* differs per OS (install.sh /
# install.ps1). See docs/SHIPPING.md.

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # create the Release and upload assets

jobs:
  release:
    name: Build bundle + publish release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build frontend (shipped prebuilt in the bundle)
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Vendor bioformats2raw (image import; Java comes from the Pixi env)
        run: |
          url=$(curl -fsSL https://api.github.com/repos/glencoesoftware/bioformats2raw/releases/latest \
                | grep -oE 'https://[^"]*bioformats2raw-[0-9.]+\.zip' | head -1)
          echo "bioformats2raw release: $url"
          curl -fsSL "$url" -o b2r.zip
          unzip -q b2r.zip
          rm b2r.zip
          mv bioformats2raw-*/ bioformats2raw
          test -x bioformats2raw/bin/bioformats2raw && echo "vendored ok"

      - name: Package portable bundle
        run: |
          mkdir -p out
          echo "${{ github.ref_name }}" > VERSION   # so the installed app knows its version
          tar -czf out/cecelia.tar.gz \
            api app app.py pixi.toml pixi.lock VERSION \
            napari/napari_bridge.py frontend/dist bioformats2raw \
            install.sh install.ps1 README.md docs
          ls -lh out/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/cecelia.tar.gz
            install.sh
            install.ps1
          generate_release_notes: true
          fail_on_unmatched_files: true
          # Tags with a pre-release suffix (e.g. v0.1.0-rc1) publish as a GitHub prerelease;
          # clean vX.Y.Z tags publish as a full release (and become the `latest` the one-liner uses).
          prerelease: ${{ contains(github.ref_name, '-') }}
