name: CI

# Smoke test: prove a *fresh checkout* installs and runs end-to-end on EVERY target OS —
# Pixi env → Julia deps → frontend build → server starts → /api/health responds
# → the server serves the built frontend. This is the "does a clean clone work?" gate.
#
# Runs the full chain on Linux, Windows and macOS-arm64 so platform-specific breakage is caught
# before release, not by a tester: missing PyPI wheels forcing a source build (e.g. cvxopt on
# macOS-arm64, TODO #00062), the platform-gated torch index, and the Windows path/process helpers
# (and it proves the Julia server actually boots + serves on Win/Mac). The repo is public, so
# GitHub-hosted runners are free on all OSes — no minute metering, hence the full matrix.
#
# All steps run under bash (Git Bash on the Windows runner) so ONE set of script steps works
# everywhere; only pixi's own tasks branch per-OS (see the `stop` target override in pixi.toml).
# Deliberately heavy (installs the real analysis env incl. torch cu124 on Linux/Windows), so the
# Pixi env is cached on pixi.lock (per platform). fail-fast is off so one OS failing still reports
# the others. Runs on pushes/PRs to main and on demand.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

defaults:
  run:
    shell: bash   # Git Bash on the Windows runner → `&`, curl, seq, sleep work everywhere

jobs:
  smoke:
    name: ${{ matrix.os }} — install → build → server health
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        # macos-latest is arm64 (M-series) — the exact osx-arm64 target the workspace builds for.
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      # Installs Pixi and materialises the default environment from pixi.lock (cached per platform).
      - name: Install Pixi + Python env
        uses: prefix-dev/setup-pixi@v0
        with:
          pixi-version: v0.71.1
          cache: true

      # Julia stays on juliaup/this action in dev + CI (not in the Pixi env). pixi run inherits PATH.
      - name: Install Julia
        uses: julia-actions/setup-julia@v3
        with:
          version: '1.12'

      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      # Instantiate the *server* project (api → pulls Cecelia from ../app). This precompiles
      # everything the server loads (incl. PythonCall/CondaPkg on first use — see TODO #00056).
      - name: Instantiate Julia (server env)
        run: julia --project=api -e 'using Pkg; Pkg.instantiate()'

      # API-layer unit tests: load the handlers with CECELIA_NO_SERVE (no socket) and exercise them
      # directly. Fixture-free, so it runs on every OS in the matrix.
      - name: API tests
        run: pixi run test-api

      # Python analysis-env tests (unittest-discovered python/cecelia/tests/*) — e.g. the zarr writer
      # regression. Runs in the Pixi env (needs numpy/dask/zarr); fixture-free.
      - name: Python tests
        run: pixi run test-py

      - name: Build frontend
        working-directory: frontend
        run: |
          # npm intermittently fails to install a platform-specific OPTIONAL native dep on Windows/macOS
          # (npm/cli#4828): here @rolldown/binding-<os> (vite 8 bundles with rolldown). Because the
          # binding is optional, a bad download/cache is non-fatal — npm exits 0 with it missing, then
          # `vite build` dies "Cannot find native binding". On Linux (the lockfile's authoring platform)
          # `npm ci` is reliable AND trips on lockfile drift, so keep it there as the reproducibility
          # guard; elsewhere `npm install` re-resolves optional deps for the host, which is far less
          # prone to the skip. (Not a hard guarantee — a flaky optional download can still be skipped;
          # re-run on the rare miss.)
          if [ "$RUNNER_OS" = "Linux" ]; then npm ci; else npm install; fi
          npm run build

      # Frontend unit tests (Vitest): pure logic extracted from .vue SFCs into src/utils/*
      # (e.g. the chain start-dot save/reload round-trip). node_modules is already installed by the
      # build step's install. Fast + fixture-free, so it runs on every OS in the matrix.
      - name: Frontend tests
        working-directory: frontend
        run: npm test

      - name: Start server and verify health + frontend serving
        run: |
          set -uo pipefail
          pixi run prod > server.log 2>&1 &
          # Wait up to ~5 min for the API (first request JIT-compiles the handler; slower on
          # Windows/macOS runners than the warm Linux one).
          for i in $(seq 1 150); do
            curl -fsS http://localhost:8080/api/health >/dev/null 2>&1 && break
            sleep 2
          done
          echo "== /api/health =="
          curl -fsS http://localhost:8080/api/health \
            || { echo "server never became healthy"; cat server.log; exit 1; }
          echo
          echo "== / (server-served frontend) =="
          curl -fsS -o /dev/null -w "%{http_code} %{content_type}\n" http://localhost:8080/
          pixi run stop || true
