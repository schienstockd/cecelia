# Cecelia Pineapple — engine environment (Julia API + Python analysis stack).
#
# Pixi manages the **Python analysis env** that the whole engine uses (it was formerly
# `napari/.venv`, but it is NOT napari-specific — cellpose, measure, btrack, the label-props
# writer and the napari bridge all share it). The env now lives at the repo-root `.pixi/`,
# not under `napari/`.
#
# Julia stays on juliaup + Manifest; Node stays on fnm. The single rule that makes this work:
# **run everything via `pixi run <task>`**. Pixi activates this env (prepends `.pixi/envs/.../bin`
# to PATH), so the Julia server's Python subprocesses and the napari bridge pick up *this*
# `python3`. That is why no hardcoded env path lives in the Julia code anymore — see
# `python_bin_path()` (config default `"python3"`) and `app/src/napari.jl`.
#
# Full rationale + non-obvious notes: docs/SHIPPING.md.

[workspace]
name = "cecelia-pineapple"
license = "GPL-3.0-or-later"
channels = ["conda-forge"]
platforms = ["linux-64", "win-64", "osx-arm64"]

[dependencies]
python = "3.12.*"
openjdk = ">=17"
# cvxopt is a btrack dependency. PyPI ships no macOS-arm64 wheel for it, so a PyPI-only solve falls
# back to the sdist and tries to compile the UMFPACK extension — which needs SuiteSparse headers
# (umfpack.h) that aren't present on a stock Mac, breaking `pixi install`. Pin it from conda-forge
# (prebuilt on every platform) so it's never built from source; pixi maps it onto btrack's PyPI req.
cvxopt = ">=1.3.1"

[pypi-dependencies]
# cecelia's own Python helpers (top-level python/, sibling to app/), installed editable. This ALSO
# pulls the IO tier (numpy, zarr>=3, dask, tifffile, ome-types, scipy, scikit-image, tqdm)
# transitively — those pins live in python/pyproject.toml, which owns the IO base so an external
# consumer (coastal) sees them via a plain `pip install cecelia`. This file therefore lists only the
# HEAVY / conda / per-platform deps; the IO tier is intentionally NOT duplicated here (Decision 2
# disjoint-sets split — every pin in exactly one file; see docs/todo/PY_PACKAGING_PLAN.md).
cecelia      = { path = "python", editable = true }
websockets   = ">=16.0"
napari       = ">=0.7"
pyqt5        = ">=5.15"
# Cellpose is PINNED to v3 on purpose: v4 dropped denoise support, and denoising cannot be
# excised from v3. Do NOT bump to 4.x — it breaks the denoise path. (INSTALL.md's old version
# table said 4.2.1.1; that was wrong.) See docs/SHIPPING.md.
cellpose     = "==3.1.1.2"
anndata      = ">=0.12"
scanpy       = ">=1.12"
pandas       = ">=2.3"
trimesh      = ">=4.0"
btrack       = ">=0.7"
# Leiden clustering (cells + tracks), CPU path. GPU (RAPIDS) is parked — see the gpu stub
# below and docs/todo/CLUSTERING_PLAN.md.
leidenalg    = ">=0.10"
napari-animation = ">=0.0.10, <0.0.11"
# MCP observer server (top-level mcp/ dir — read-only Claude access to a running project). Only the
# `mcp` run task needs it; the client + its tests are stdlib-only. See mcp/README.md, docs/ai-assist/OBSERVER.md.
mcp          = ">=1.2"
squidpy = ">=1.8.3, <1.9"
harmonypy = ">=0.0.9, <1"

# --- PyTorch: CUDA build on Linux/Windows, default (MPS/CPU) build on macOS -------------------
# The cu124 wheel index only carries linux/win wheels, so torch/torchvision MUST be declared
# per-platform — a global cu124 index would make macOS unsolvable. Keep torch and torchvision
# on the SAME index (they must match).
[target.linux-64.pypi-dependencies]
torch       = { version = ">=2.6", index = "https://download.pytorch.org/whl/cu124" }
torchvision = { version = ">=0.21", index = "https://download.pytorch.org/whl/cu124" }

[target.win-64.pypi-dependencies]
torch       = { version = ">=2.6", index = "https://download.pytorch.org/whl/cu124" }
torchvision = { version = ">=0.21", index = "https://download.pytorch.org/whl/cu124" }

[target.osx-arm64.pypi-dependencies]
torch       = ">=2.6"
torchvision = ">=0.21"

# --- Run templates (replace the old scripts/*.sh|.bat launchers) ------------------------------
# Launch everything via `pixi run <task>` so the activated env's python3 is what the Julia server's
# subprocesses and the napari bridge pick up. These are cross-platform — julia (juliaup), npm (fnm)
# and python3 (this env) all resolve on PATH; only the `stop*` tasks are OS-specific (see the
# [target.win-64.tasks] block below).
[tasks]
# Backend — Julia API server (port 8080). NB: api/src/*.jl are NOT Revise-tracked → restart for api edits.
# `-t auto` runs the API multithreaded: handlers run on the thread pool so a blocking HDF5 read no
# longer stalls the accept loop / a napari open, and the scheduler's per-image task functions
# (Threads.@spawn) actually parallelise. Julia HDF5 is serialised via `_with_h5`; shared API state is
# lock-guarded. Override with JULIA_NUM_THREADS if you want a fixed count.
dev  = { cmd = "julia --project dev.jl", cwd = "api", env = { CECELIA_DEV = "1", CECELIA_SUPERVISED = "1" } }  # dev.jl supervises BOTH the Revise hot-reload backend AND the frontend (Vite) — relaunches them on Settings→System Restart/worktree-switch. So `pixi run dev` now starts the frontend too; don't also run `pixi run frontend` alongside it. CECELIA_DEV marks a dev server (prod/app.py never sets it → auto-detected); CECELIA_SUPERVISED enables the backend Restart button
prod = { cmd = "julia --project -t auto src/server.jl", cwd = "api" }                                    # plain include (production)

# Tests — one whole suite per layer. Package (headless Cecelia) + API adapters (loaded with
# CECELIA_NO_SERVE — no socket bound) + frontend (Vitest, pure logic from src/utils/*) + Python
# analysis-env (unittest-discovered python/cecelia/tests/*, e.g. the zarr writer) + MCP observer
# client (stdlib unittest, mocked HTTP). All run in CI.
test-pkg      = { cmd = "julia --project test/runtests.jl", cwd = "app" }
test-api      = { cmd = "julia --project test/runtests.jl", cwd = "api" }
test-frontend = { cmd = "npm test", cwd = "frontend" }
test-py       = { cmd = "python -m unittest discover -s python/cecelia/tests -p 'test_*.py' -v" }
test-mcp      = { cmd = "python -m unittest discover -s tests -t . -v", cwd = "mcp", env = { PYTHONPATH = "." } }

# MCP observer server (stdio) — read-only Claude access to the running project (needs `pixi run dev`
# on :8080). See mcp/README.md for wiring into Claude Code. Override the API with CECELIA_API_URL.
mcp           = { cmd = "python -m cecelia_mcp.server", cwd = "mcp", env = { PYTHONPATH = "." } }

# Frontend — Vite (port 5173). NOTE: `pixi run dev` already starts this; run it standalone ONLY when
# not using `pixi run dev` (e.g. previewing another worktree on a spare port), else two Vites clash.
frontend = { cmd = "npm run dev", cwd = "frontend" }    # dev server, hot reload
build    = { cmd = "npm run build", cwd = "frontend" }  # static production build

# Napari bridge (port 7655) standalone — normally the backend launches it; run this to debug it alone.
napari = { cmd = "python3 napari_bridge.py", cwd = "napari" }

# Headless task console — read-only live view of scheduler tasks over the server's WebSocket.
# Reporting only (no run/cancel); safe alongside the GUI. `-- --stream` for append-only log output.
console = { cmd = "julia --project task_console.jl", cwd = "api" }

# Notebook Playground (Pluto, port 7660) — pure-Julia downstream analysis. Runs its OWN Julia
# session (the pluto/ env path-sources Cecelia), NOT the API server. Point it at a project's
# notebooks via CECELIA_NOTEBOOKS_DIR; defaults to the shipped examples in notebooks/. The server
# launches WITHOUT a sysimage (it's just Pluto); notebook WORKERS pick up pluto/deps.so if built
# (see notebooks-sysimage) — that's what kills Makie's ~20s time-to-first-plot. See
# docs/todo/NOTEBOOK_PLAYGROUND_PLAN.md.
notebooks = { cmd = "julia --project launch.jl", cwd = "pluto" }
# Build the deps-only sysimage (Makie/CairoMakie + AoG + DataFrames + HDF5 + HTTP; NOT Cecelia, so
# Revise still hot-reloads it). ~10 min, ~1.4 GB, one-time; pluto/deps.so is git-ignored. DEV build.
notebooks-sysimage = { cmd = "julia --project build_sysimage.jl", cwd = "pluto" }
# RELEASE build: same, but also bakes in Cecelia + CeceliaNb (code frozen) for near-instant first
# plot AND first pop_df. Wired into the packaging flow — see docs/SHIPPING.md. Also → pluto/deps.so.
notebooks-sysimage-full = { cmd = "julia --project build_sysimage_full.jl", cwd = "pluto" }
# Resolve/precompile the pluto env (its own manifest — like julia-instantiate for app/).
notebooks-instantiate = { cmd = "julia --project -e 'using Pkg; Pkg.instantiate()'", cwd = "pluto" }

# One-click launch (the desktop-shortcut entrypoint): start the prod server, wait for /api/health,
# open the default browser at :8080. The Julia server serves the built frontend, so run `build` first.
app = "python app.py"

# Update the env to the latest versions allowed by pixi.toml (console update path; the in-app
# "Update" button hits /api/update, which runs the same). Refreshes pixi.lock.
update = "pixi update"

# Julia package deps.
julia-instantiate = "julia --project=app -e 'using Pkg; Pkg.instantiate()'"

# Stop by PORT, not by process name — killing by name self-matches the task's own shell and was
# orphaning the napari bridge (see docs/SHIPPING.md). `stop-napari` alone forces a fresh bridge
# after editing napari_bridge.py (the backend otherwise adopts the running bridge on restart).
# -sTCP:LISTEN restricts to the LISTENING server; without it lsof also returns clients CONNECTED to the
# port — the browser on :5173 (page + Vite HMR socket) — so `kill` would crash Firefox/Chrome. Mirrors
# the win-64 branch's `-State Listen`.
stop           = "kill $(lsof -ti tcp:8080 -sTCP:LISTEN) 2>/dev/null ; kill $(lsof -ti tcp:5173 -sTCP:LISTEN) 2>/dev/null ; kill $(lsof -ti tcp:7655 -sTCP:LISTEN) 2>/dev/null ; kill $(lsof -ti tcp:7660 -sTCP:LISTEN) 2>/dev/null ; echo 'stopped backend(8080)/frontend(5173)/napari(7655)/notebooks(7660)'"
stop-backend   = "kill $(lsof -ti tcp:8080 -sTCP:LISTEN) 2>/dev/null ; echo 'stopped backend(8080)'"
stop-napari    = "kill $(lsof -ti tcp:7655 -sTCP:LISTEN) 2>/dev/null ; echo 'stopped napari bridge(7655)'"
stop-notebooks = "kill $(lsof -ti tcp:7660 -sTCP:LISTEN) 2>/dev/null ; echo 'stopped notebooks(7660)'"

# Windows: kill by listening port via PowerShell (lsof is unix-only). Untested on Windows hardware.
[target.win-64.tasks]
stop           = "powershell -NoProfile -Command \"Get-NetTCPConnection -LocalPort 8080,5173,7655,7660 -State Listen -ErrorAction SilentlyContinue | ForEach-Object { Stop-Process -Id $_.OwningProcess -Force }\""
stop-backend   = "powershell -NoProfile -Command \"Get-NetTCPConnection -LocalPort 8080 -State Listen -ErrorAction SilentlyContinue | ForEach-Object { Stop-Process -Id $_.OwningProcess -Force }\""
stop-napari    = "powershell -NoProfile -Command \"Get-NetTCPConnection -LocalPort 7655 -State Listen -ErrorAction SilentlyContinue | ForEach-Object { Stop-Process -Id $_.OwningProcess -Force }\""
stop-notebooks = "powershell -NoProfile -Command \"Get-NetTCPConnection -LocalPort 7660 -State Listen -ErrorAction SilentlyContinue | ForEach-Object { Stop-Process -Id $_.OwningProcess -Force }\""

# --- GPU acceleration (PARKED) ----------------------------------------------------------------
# RAPIDS-based GPU clustering is CUDA-only (Linux/Windows + NVIDIA). When un-parked, add it as a
# feature/environment so macOS/CPU simply never resolve it and fall back to leidenalg:
#
#   [feature.gpu.pypi-dependencies]
#   rapids-singlecell = "*"      # + cuml-cu12 / cugraph-cu12 / cupy-cuda12x via the NVIDIA index
#   [environments]
#   gpu = ["gpu"]
#
# Left commented so the default solve stays clean. See docs/todo/CLUSTERING_PLAN.md.

# coastal (live-cell seg/tracking) was an editable sibling-path install (~/cc-workspace/coastal,
# not a git repo) — dropped for now to keep the lockfile reproducible. Re-add later as an
# editable path-dep (dev) or a git/PyPI dep (shipping). See docs/SHIPPING.md.
